    <text
      x="32"
      y="39"
      text-anchor="middle"
      font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial"
      font-size="18"
      font-weight="800"
      letter-spacing="-0.6"
      fill="#0F172A"
    >WELJ</text>
  </g>
