<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" role="img" aria-label="Wel logo">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2563EB"/>
      <stop offset="1" stop-color="#06B6D4"/>
    </linearGradient>
    <filter id="s" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#0F172A" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect x="2.5" y="2.5" width="59" height="59" rx="14" fill="url(#g)"/>
  <rect x="2.5" y="2.5" width="59" height="59" rx="14" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="1"/>

  <g filter="url(#s)">
